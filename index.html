<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexArchive — Legislative Document Repository</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ef;
  --bg2: #eee9e0;
  --bg3: #e5dfd3;
  --ink: #1a1610;
  --ink2: #4a4438;
  --ink3: #7a7060;
  --rule: #c8bfb0;
  --rule2: #b0a698;
  --gold: #8b6914;
  --gold-light: #c9972e;
  --res: #1a4a2e;
  --res-bg: #e8f2ec;
  --res-border: #7ab894;
  --ord: #2e1a4a;
  --ord-bg: #ede8f2;
  --ord-border: #9478b8;
  --proc: #1a2e4a;
  --proc-bg: #e8ecf2;
  --proc-border: #7894b8;
  --exec: #4a2e1a;
  --exec-bg: #f2ece8;
  --exec-border: #b89478;
  --active-badge: #1a4a2e;
  --active-bg: #d4eadb;
  --amended-badge: #4a3a00;
  --amended-bg: #f5e9c0;
  --repealed-badge: #4a1a1a;
  --repealed-bg: #ead4d4;
  --pending-badge: #1a2e4a;
  --pending-bg: #d4dcea;
  --radius: 4px;
  --shadow: 0 2px 8px rgba(26,22,16,0.10), 0 1px 2px rgba(26,22,16,0.06);
  --shadow-lg: 0 8px 32px rgba(26,22,16,0.14), 0 2px 8px rgba(26,22,16,0.08);
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Source Serif 4', Georgia, serif;
  --font-mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Header ── */
#site-header {
  background: var(--ink);
  color: var(--bg);
  padding: 0 2rem;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 3px solid var(--gold);
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 2rem;
  height: 64px;
}

.site-brand {
  display: flex;
  flex-direction: column;
  line-height: 1;
  text-decoration: none;
  color: inherit;
  white-space: nowrap;
}

.brand-name {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--bg);
}

.brand-sub {
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-light);
  font-family: var(--font-mono);
  margin-top: 2px;
}

.header-search {
  flex: 1;
  position: relative;
  max-width: 500px;
}

.header-search input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  color: var(--bg);
  font-family: var(--font-body);
  font-size: 0.92rem;
  padding: 0.45rem 1rem 0.45rem 2.4rem;
  border-radius: var(--radius);
  outline: none;
  transition: background 0.2s, border-color 0.2s;
}

.header-search input::placeholder { color: rgba(247,244,239,0.45); }
.header-search input:focus {
  background: rgba(255,255,255,0.13);
  border-color: var(--gold-light);
}

.header-search .search-icon {
  position: absolute;
  left: 0.7rem;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  opacity: 0.5;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-left: auto;
}

.btn-add {
  background: var(--gold);
  color: #fff;
  border: none;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 600;
  padding: 0.4rem 1rem;
  border-radius: var(--radius);
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-add:hover { background: var(--gold-light); }

.view-toggle {
  display: flex;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius);
  overflow: hidden;
}

.view-toggle button {
  background: none;
  border: none;
  color: rgba(247,244,239,0.5);
  cursor: pointer;
  padding: 0.4rem 0.6rem;
  display: flex;
  align-items: center;
  transition: color 0.15s, background 0.15s;
}
.view-toggle button:hover { color: var(--bg); }
.view-toggle button.active { background: rgba(255,255,255,0.15); color: var(--bg); }

/* ── Layout ── */
#app {
  max-width: 1280px;
  margin: 0 auto;
  padding: 1.5rem 2rem;
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 1.5rem;
  align-items: start;
}

/* ── Sidebar ── */
#sidebar {
  position: sticky;
  top: 80px;
}

.sidebar-panel {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
}

.panel-title {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 0.7rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--rule);
}

.filter-group { margin-bottom: 0.8rem; }
.filter-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--ink2);
  margin-bottom: 0.35rem;
  display: block;
}

.filter-select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--rule2);
  border-radius: var(--radius);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 0.85rem;
  padding: 0.35rem 0.6rem;
  outline: none;
  cursor: pointer;
}
.filter-select:focus { border-color: var(--gold); }

.tag-cloud { display: flex; flex-wrap: wrap; gap: 0.3rem; }

.tag {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 0.15rem 0.5rem;
  font-size: 0.72rem;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  color: var(--ink2);
  font-family: var(--font-mono);
}
.tag:hover { background: var(--bg3); border-color: var(--rule2); }
.tag.active { background: var(--gold); border-color: var(--gold); color: #fff; }

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
}

.stat-item {
  text-align: center;
  padding: 0.5rem;
  background: var(--bg);
  border-radius: var(--radius);
  border: 1px solid var(--rule);
}

.stat-num {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
}

.stat-lbl {
  font-size: 0.65rem;
  color: var(--ink3);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 2px;
}

/* ── Main ── */
#main { min-width: 0; }

.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.result-count {
  font-size: 0.82rem;
  color: var(--ink3);
  font-family: var(--font-mono);
}

.sort-select {
  background: var(--bg);
  border: 1px solid var(--rule2);
  border-radius: var(--radius);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 0.82rem;
  padding: 0.3rem 0.6rem;
  outline: none;
  cursor: pointer;
}

/* ── Document Cards — Grid View ── */
#doc-grid.grid-view {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}

#doc-grid.list-view {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

/* Grid card */
.doc-card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 1rem 1rem 0.85rem;
  cursor: pointer;
  transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.doc-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}

.doc-card[data-type="Resolution"]::before { background: var(--res); }
.doc-card[data-type="Ordinance"]::before { background: var(--ord); }
.doc-card[data-type="Proclamation"]::before { background: var(--proc); }
.doc-card[data-type="Executive Order"]::before { background: var(--exec); }

.doc-card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
  border-color: var(--rule2);
}

.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.5rem; }

.type-badge {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.15rem 0.5rem;
  border-radius: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}

.type-badge[data-type="Resolution"] { background: var(--res-bg); color: var(--res); border: 1px solid var(--res-border); }
.type-badge[data-type="Ordinance"] { background: var(--ord-bg); color: var(--ord); border: 1px solid var(--ord-border); }
.type-badge[data-type="Proclamation"] { background: var(--proc-bg); color: var(--proc); border: 1px solid var(--proc-border); }
.type-badge[data-type="Executive Order"] { background: var(--exec-bg); color: var(--exec); border: 1px solid var(--exec-border); }

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

.status-dot[data-status="Active"] { background: #2a7a4a; }
.status-dot[data-status="Amended"] { background: #c9971e; }
.status-dot[data-status="Repealed"] { background: #9a2a2a; }
.status-dot[data-status="Pending"] { background: #2a4a7a; }

.doc-num {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--ink3);
  margin-bottom: 0.3rem;
}

.doc-title {
  font-family: var(--font-display);
  font-size: 0.92rem;
  font-weight: 600;
  line-height: 1.35;
  color: var(--ink);
  margin-bottom: 0.4rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.doc-excerpt {
  font-size: 0.78rem;
  color: var(--ink3);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 0.6rem;
}

.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 0.5rem; }

.doc-date {
  font-family: var(--font-mono);
  font-size: 0.67rem;
  color: var(--ink3);
}

.doc-cat {
  font-size: 0.67rem;
  background: var(--bg2);
  color: var(--ink3);
  padding: 0.1rem 0.4rem;
  border-radius: 2px;
  font-family: var(--font-mono);
  letter-spacing: 0.05em;
}

/* List view overrides */
.list-view .doc-card {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 0.75rem;
  padding: 0.7rem 1rem;
  align-items: center;
}

.list-view .doc-card::before { display: none; }

.list-view .card-meta {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
  min-width: 80px;
  border-right: 1px solid var(--rule);
  padding-right: 0.75rem;
}

.list-view .card-body { min-width: 0; }

.list-view .doc-title {
  font-size: 0.88rem;
  -webkit-line-clamp: 1;
  margin-bottom: 0.15rem;
}

.list-view .doc-excerpt { -webkit-line-clamp: 1; margin-bottom: 0; }
.list-view .card-footer { justify-content: flex-end; flex-direction: column; gap: 0.3rem; align-items: flex-end; }
.list-view .card-header { display: none; }

/* ── Pagination ── */
#pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--rule);
}

.page-btn {
  background: #fff;
  border: 1px solid var(--rule);
  color: var(--ink2);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.3rem 0.65rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.page-btn:hover { background: var(--bg2); border-color: var(--rule2); }
.page-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Modal ── */
#modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,22,16,0.55);
  z-index: 200;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 3rem 1rem;
  overflow-y: auto;
  backdrop-filter: blur(2px);
}

#modal-overlay.open { display: flex; }

#modal {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 720px;
  overflow: hidden;
  position: relative;
  animation: modal-in 0.2s ease;
}

@keyframes modal-in {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.modal-bar {
  height: 4px;
}
.modal-bar[data-type="Resolution"] { background: var(--res); }
.modal-bar[data-type="Ordinance"] { background: var(--ord); }
.modal-bar[data-type="Proclamation"] { background: var(--proc); }
.modal-bar[data-type="Executive Order"] { background: var(--exec); }

.modal-head {
  padding: 1.25rem 1.5rem 1rem;
  border-bottom: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
}

.modal-meta { flex: 1; min-width: 0; }

.modal-badges { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.5rem; }

.modal-num {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--ink3);
  margin-bottom: 0.25rem;
}

.modal-title {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1.3;
  color: var(--ink);
}

.modal-close {
  background: var(--bg2);
  border: 1px solid var(--rule);
  color: var(--ink2);
  width: 30px; height: 30px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}
.modal-close:hover { background: var(--bg3); }

.modal-body { padding: 1.25rem 1.5rem; }

.modal-info-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.75rem;
  margin-bottom: 1.1rem;
  padding-bottom: 1.1rem;
  border-bottom: 1px solid var(--rule);
}

.info-item {}
.info-lbl {
  font-size: 0.65rem;
  font-family: var(--font-mono);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 0.2rem;
}

.info-val {
  font-size: 0.85rem;
  color: var(--ink);
  font-weight: 600;
}

.modal-section-title {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 0.5rem;
}

.modal-summary {
  font-size: 0.9rem;
  line-height: 1.65;
  color: var(--ink2);
  margin-bottom: 1.1rem;
  padding-bottom: 1.1rem;
  border-bottom: 1px solid var(--rule);
}

.modal-fulltext {
  font-size: 0.82rem;
  line-height: 1.75;
  color: var(--ink2);
  font-family: var(--font-body);
  white-space: pre-wrap;
  max-height: 260px;
  overflow-y: auto;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 0.9rem 1rem;
  margin-bottom: 1rem;
}

.modal-tags { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 1.1rem; padding-bottom: 1.1rem; border-bottom: 1px solid var(--rule); }

.modal-tag {
  background: var(--bg2);
  border: 1px solid var(--rule);
  padding: 0.2rem 0.6rem;
  border-radius: 2px;
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--ink2);
}

.modal-actions { display: flex; gap: 0.5rem; }

.btn-action {
  background: var(--bg);
  border: 1px solid var(--rule2);
  color: var(--ink2);
  font-family: var(--font-body);
  font-size: 0.8rem;
  padding: 0.4rem 0.85rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.12s;
  display: flex; align-items: center; gap: 0.3rem;
}
.btn-action:hover { background: var(--bg2); }

.status-badge {
  font-family: var(--font-mono);
  font-size: 0.64rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.15rem 0.5rem;
  border-radius: 2px;
}

.status-badge[data-status="Active"] { background: var(--active-bg); color: var(--active-badge); }
.status-badge[data-status="Amended"] { background: var(--amended-bg); color: var(--amended-badge); }
.status-badge[data-status="Repealed"] { background: var(--repealed-bg); color: var(--repealed-badge); }
.status-badge[data-status="Pending"] { background: var(--pending-bg); color: var(--pending-badge); }

/* ── Add Record Form Drawer ── */
#form-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,22,16,0.5);
  z-index: 300;
  display: none;
  justify-content: flex-end;
  backdrop-filter: blur(2px);
}
#form-overlay.open { display: flex; }

#form-drawer {
  background: #fff;
  width: 520px;
  max-width: 100%;
  height: 100%;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slide-in 0.22s ease;
  display: flex;
  flex-direction: column;
}

@keyframes slide-in {
  from { transform: translateX(100%); }
  to   { transform: translateX(0); }
}

.drawer-head {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 2;
}

.drawer-title {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
}

.drawer-body { padding: 1.25rem 1.5rem; flex: 1; }

.form-row { margin-bottom: 1rem; }
.form-row.two { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

.form-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--ink2);
  margin-bottom: 0.3rem;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--rule2);
  border-radius: var(--radius);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 0.88rem;
  padding: 0.45rem 0.7rem;
  outline: none;
  transition: border-color 0.15s;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--gold);
  background: #fff;
}

.form-textarea { resize: vertical; min-height: 80px; line-height: 1.55; }

.drawer-foot {
  padding: 1rem 1.5rem;
  border-top: 1px solid var(--rule);
  display: flex;
  gap: 0.5rem;
  justify-content: flex-end;
  position: sticky;
  bottom: 0;
  background: #fff;
}

.btn-primary {
  background: var(--ink);
  color: var(--bg);
  border: none;
  font-family: var(--font-body);
  font-size: 0.88rem;
  font-weight: 600;
  padding: 0.5rem 1.25rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.15s;
}
.btn-primary:hover { background: var(--ink2); }

.btn-ghost {
  background: none;
  border: 1px solid var(--rule2);
  color: var(--ink2);
  font-family: var(--font-body);
  font-size: 0.88rem;
  padding: 0.5rem 1rem;
  border-radius: var(--radius);

  transition: background 0.12s;
}

  padding: 4rem 1rem;

}

.empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.35; }

.empty-title {

  color: var(--ink2);
  margin-bottom: 0.35rem;
}

.empty-text { font-size: 0.85rem; color: var(--ink3); }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--ink);
  color: var(--bg);

  padding: 0.65rem 1.2rem;

  opacity: 0;

  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  font-family: var(--font-body);
}
#toast.show { opacity: 1; transform: translateY(0); }

/* ── Responsive ── */
@media (max-width: 900px) {
  #app { grid-template-columns: 1fr; }
  #sidebar { position: static; }
}

@media (max-width: 640px) {
  .header-inner { gap: 0.75rem; }
  .brand-sub { display: none; }

}

    const matchQ = !q || [d.title, d.num, d.summary, d.sponsor, d.category, ...(d.tags||[])].some(f => f && f.toLowerCase().includes(q));
    const matchY = !year || d.date.startsWith(year);
    const matchT = !type || d.type === type;
    const matchS = !status || d.status === status;
    const matchTag = !activeTag || (d.tags && d.tags.includes(activeTag));
    return matchQ && matchY && matchT && matchS && matchTag;
  });

  // Sort
  filtered.sort((a, b) => {
    if (sort === 'date-desc') return b.date.localeCompare(a.date);
    if (sort === 'date-asc') return a.date.localeCompare(b.date);
    if (sort === 'title-asc') return a.title.localeCompare(b.title);
    if (sort === 'num-asc') return a.num.localeCompare(b.num);
    return 0;
  });

  currentPage = 1;
  renderDocs();
  renderStats();
}

document.getElementById('search-input').addEventListener('input', applyFilters);

// ── Tag Cloud ─────────────────────────────────────────────────────────────────
function renderTagCloud() {
  const all = {};
  docs.forEach(d => (d.tags||[]).forEach(t => { all[t] = (all[t]||0)+1; }));
  const sorted = Object.entries(all).sort((a,b)=>b[1]-a[1]).slice(0,18);
  const cloud = document.getElementById('tag-cloud');
  cloud.innerHTML = sorted.map(([t,c]) =>
    `<span class="tag${activeTag===t?' active':''}" onclick="filterByTag('${t}')">${t} <span style="opacity:.6">(${c})</span></span>`
  ).join('');
}

function filterByTag(tag) {
  activeTag = activeTag === tag ? null : tag;
  renderTagCloud();
  applyFilters();
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const total = docs.length;
  const active = docs.filter(d=>d.status==='Active').length;
  const res = docs.filter(d=>d.type==='Resolution').length;
  const ord = docs.filter(d=>d.type==='Ordinance').length;
  const proc = docs.filter(d=>d.type==='Proclamation').length;
  const exec = docs.filter(d=>d.type==='Executive Order').length;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-item"><div class="stat-num">${total}</div><div class="stat-lbl">Total</div></div>
    <div class="stat-item"><div class="stat-num">${active}</div><div class="stat-lbl">Active</div></div>
    <div class="stat-item"><div class="stat-num">${res}</div><div class="stat-lbl">Resolutions</div></div>
    <div class="stat-item"><div class="stat-num">${ord}</div><div class="stat-lbl">Ordinances</div></div>
    <div class="stat-item"><div class="stat-num">${proc}</div><div class="stat-lbl">Proclamations</div></div>
    <div class="stat-item"><div class="stat-num">${exec}</div><div class="stat-lbl">Exec. Orders</div></div>
  `;
}

// ── Render Docs ───────────────────────────────────────────────────────────────
function renderDocs() {
  const grid = document.getElementById('doc-grid');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('result-count');

  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  count.textContent = `${filtered.length} record${filtered.length !== 1 ? 's' : ''} found`;

  if (!filtered.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  if (viewMode === 'grid') {
    grid.innerHTML = page.map(d => gridCard(d)).join('');
  } else {
    grid.innerHTML = page.map(d => listCard(d)).join('');
  }

  renderPagination();
}

function gridCard(d) {
  const fmtDate = new Date(d.date+'T00:00:00').toLocaleDateString('en-PH', {year:'numeric',month:'short',day:'numeric'});
  return `
    <div class="doc-card" data-type="${d.type}" onclick="openDoc(${d.id})">
      <div class="card-header">
        <span class="type-badge" data-type="${d.type}">${d.type}</span>
        <span class="status-dot" data-status="${d.status}" title="${d.status}"></span>
      </div>
      <div class="doc-num">${d.num}</div>
      <div class="doc-title">${d.title}</div>
      <div class="doc-excerpt">${d.summary}</div>
      <div class="card-footer">
        <span class="doc-date">${fmtDate}</span>
        <span class="doc-cat">${d.category}</span>
      </div>
    </div>`;
}

function listCard(d) {
  const fmtDate = new Date(d.date+'T00:00:00').toLocaleDateString('en-PH', {year:'numeric',month:'short',day:'numeric'});
  return `
    <div class="doc-card" data-type="${d.type}" onclick="openDoc(${d.id})">
      <div class="card-meta">
        <span class="type-badge" data-type="${d.type}" style="font-size:.6rem">${d.type.slice(0,3).toUpperCase()}</span>
        <span class="status-dot" data-status="${d.status}" title="${d.status}" style="margin-top:4px"></span>
        <span class="doc-date">${fmtDate}</span>
      </div>
      <div class="card-body">
        <div class="doc-num">${d.num}</div>
        <div class="doc-title">${d.title}</div>
        <div class="doc-excerpt">${d.summary}</div>
      </div>
      <div class="card-footer">
        <span class="doc-cat">${d.category}</span>
        <span class="status-badge" data-status="${d.status}">${d.status}</span>
      </div>
    </div>`;
}

// ── Pagination ────────────────────────────────────────────────────────────────
function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>`;
  for (let i = 1; i <= total; i++) {
    html += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>Next →</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderDocs();
  document.getElementById('main').scrollIntoView({behavior:'smooth'});
}

// ── View Toggle ───────────────────────────────────────────────────────────────
function setView(v) {
  viewMode = v;
  document.getElementById('doc-grid').className = v === 'grid' ? 'grid-view' : 'list-view';
  document.getElementById('btn-grid').classList.toggle('active', v==='grid');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  renderDocs();
}

// ── Doc Modal ─────────────────────────────────────────────────────────────────
function openDoc(id) {
  const d = docs.find(x => x.id === id);
  if (!d) return;
  currentDoc = d;
  const fmtDate = new Date(d.date+'T00:00:00').toLocaleDateString('en-PH', {year:'numeric',month:'long',day:'numeric'});

  document.getElementById('modal-bar').dataset.type = d.type;
  document.getElementById('modal-type-badge').textContent = d.type;
  document.getElementById('modal-type-badge').dataset.type = d.type;
  document.getElementById('modal-status-badge').textContent = d.status;
  document.getElementById('modal-status-badge').dataset.status = d.status;
  document.getElementById('modal-num').textContent = d.num;
  document.getElementById('modal-title').textContent = d.title;
  document.getElementById('modal-date').textContent = fmtDate;
  document.getElementById('modal-category').textContent = d.category;
  document.getElementById('modal-sponsor').textContent = d.sponsor;
  document.getElementById('modal-summary').textContent = d.summary;
  document.getElementById('modal-fulltext').textContent = d.fulltext || '(No full text available.)';
  document.getElementById('modal-tags').innerHTML = (d.tags||[]).map(t =>
    `<span class="modal-tag" onclick="filterByTag('${t}');closeModal()">${t}</span>`
  ).join('');

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function printDoc() {
  if (!currentDoc) return;
  const w = window.open('', '_blank');
  w.document.write(`<html><head><title>${currentDoc.num}</title><style>
    body{font-family:Georgia,serif;max-width:700px;margin:2rem auto;color:#1a1610;line-height:1.7}
    h1{font-size:1.1rem;margin-bottom:.5rem}
    .meta{font-size:.8rem;color:#666;margin-bottom:1rem;border-bottom:1px solid #ccc;padding-bottom:.5rem}
    pre{white-space:pre-wrap;font-family:Georgia,serif;font-size:.9rem;line-height:1.75}
    @media print{@page{margin:2cm}}
  </style></head><body>
    <div class="meta">${currentDoc.type} No. ${currentDoc.num} &nbsp;·&nbsp; ${currentDoc.date} &nbsp;·&nbsp; Status: ${currentDoc.status}</div>
    <h1>${currentDoc.title}</h1>
    <p style="font-size:.88rem;color:#444;margin-bottom:1rem">${currentDoc.summary}</p>
    <pre>${currentDoc.fulltext || ''}</pre>
  </body></html>`);
  w.document.close();
  w.print();
}

function copyLink() {
  if (!currentDoc) return;
  const url = `${location.origin}${location.pathname}#doc-${currentDoc.id}`;
  navigator.clipboard.writeText(url).then(() => toast('Link copied to clipboard'));
}

function editDoc() {
  if (!currentDoc) return;
  closeModal();
  openForm(currentDoc.id);
}

// ── Add/Edit Form ─────────────────────────────────────────────────────────────
function openForm(id = null) {
  editingId = id;
  document.getElementById('drawer-title').textContent = id ? 'Edit Record' : 'Add New Record';
  if (id) {
    const d = docs.find(x => x.id === id);
    document.getElementById('f-type').value = d.type;
    document.getElementById('f-num').value = d.num;
    document.getElementById('f-title').value = d.title;
    document.getElementById('f-date').value = d.date;
    document.getElementById('f-status').value = d.status;
    document.getElementById('f-category').value = d.category;
    document.getElementById('f-sponsor').value = d.sponsor;
    document.getElementById('f-summary').value = d.summary;
    document.getElementById('f-fulltext').value = d.fulltext || '';
    document.getElementById('f-tags').value = (d.tags||[]).join(', ');
  } else {
    ['f-num','f-title','f-date','f-summary','f-fulltext','f-tags','f-category','f-sponsor'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-type').value = 'Resolution';
    document.getElementById('f-status').value = 'Active';
  }
  document.getElementById('form-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeForm() {
  document.getElementById('form-overlay').classList.remove('open');
  document.body.style.overflow = '';
  editingId = null;
}

function saveRecord() {
  const num = document.getElementById('f-num').value.trim();
  const title = document.getElementById('f-title').value.trim();
  const date = document.getElementById('f-date').value;
  if (!num || !title || !date) { toast('Please fill in required fields (Number, Title, Date)'); return; }

  const rec = {
    id: editingId || Date.now(),
    type: document.getElementById('f-type').value,
    num,
    title,
    date,
    status: document.getElementById('f-status').value,
    category: document.getElementById('f-category').value.trim() || 'General',
    sponsor: document.getElementById('f-sponsor').value.trim() || '—',
    summary: document.getElementById('f-summary').value.trim(),
    fulltext: document.getElementById('f-fulltext').value.trim(),
    tags: document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean)
  };

  if (editingId) {
    const idx = docs.findIndex(x => x.id === editingId);
    docs[idx] = rec;
  } else {
    docs.unshift(rec);
  }

  save();
  closeForm();
  renderTagCloud();
  renderStats();
  populateYearFilterFresh();
  applyFilters();
  toast(editingId ? 'Record updated successfully' : 'Record added successfully');
}

function populateYearFilterFresh() {
  const sel = document.getElementById('filter-year');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Years</option>';
  const years = [...new Set(docs.map(d => d.date.slice(0,4)))].sort((a,b)=>b-a);
  years.forEach(y => { const o = document.createElement('option'); o.value=y; o.textContent=y; sel.appendChild(o); });
  sel.value = cur;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeForm(); }
});

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
